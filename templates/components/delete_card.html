<div class="form-section text-center" style="max-width:480px;margin:auto">
  <div class="mb-3"><i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i></div>
  <h5>Delete {{ obj_type|default:'Item' }}</h5>
  <p class="text-muted">Are you sure you want to delete <strong>{{ obj }}</strong>? This action cannot be undone.</p>
  <form method="post" class="d-flex gap-2 justify-content-center">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
    <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
